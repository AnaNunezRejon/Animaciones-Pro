<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIS-02: Timeline Horizontal Progreso</title>
    <link rel="stylesheet" href="lista-02.css">
</head>
<body>
    <div class="timeline-container">
        <header class="timeline-header">
            <h1>Nuestro Proceso</h1>
            <p>De la idea al lanzamiento</p>
        </header>
        
        <div class="timeline-horizontal" id="timeline">
            <div class="progress-line">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="timeline-items" id="timelineItems">
                <!-- Items generados con JS -->
            </div>
        </div>
        
        <div class="scroll-hint">← Desliza horizontalmente →</div>
    </div>
    
    <script src="lista-02.js"></script>
</body>
</html>

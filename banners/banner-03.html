<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAN-03: Cinema Glitch Partículas</title>
    <link rel="stylesheet" href="banner-03.css">
</head>
<body>
    <div class="cinema-particle-container">
        <!-- Canvas para partículas -->
        <canvas id="particleCanvas" class="particle-layer"></canvas>
        
        <!-- Máscara cinematográfica -->
        <div class="cinematic-mask top"></div>
        <div class="cinematic-mask bottom"></div>
        
        <!-- Contenido con glitch -->
        <div class="cinema-content">
            <div class="glitch-wrapper">
                <h1 class="glitch-text" data-text="FUTURO DIGITAL">FUTURO DIGITAL</h1>
            </div>
            <p class="cinema-subtitle">El cine encuentra la web</p>
            
            <div class="cinema-controls">
                <button class="cinema-btn" id="playBtn">
                    <span class="btn-icon">▶</span>
                    <span>Reproducir experiencia</span>
                </button>
            </div>
        </div>
        
        <!-- Scanlines -->
        <div class="scanlines"></div>
        
        <!-- Vignette -->
        <div class="vignette"></div>
    </div>
    
    <script src="banner-03.js"></script>
</body>
</html>

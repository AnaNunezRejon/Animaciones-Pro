<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAN-02: Typewriter Cinemático</title>
    <link rel="stylesheet" href="banner-02.css">
</head>
<body>
    <div class="typewriter-hero">
        <!-- Fondo degradado animado -->
        <div class="gradient-bg"></div>
        
        <!-- Grid decorativo -->
        <div class="grid-overlay"></div>
        
        <!-- Contenido -->
        <div class="hero-content">
            <div class="typewriter-container">
                <h1 class="typewriter-text" id="typewriter"></h1>
                <span class="cursor">|</span>
            </div>
            <p class="hero-tagline">Diseño web que cautiva</p>
            
            <div class="feature-pills">
                <span class="pill">Animaciones fluidas</span>
                <span class="pill">100% CSS</span>
                <span class="pill">Performance óptimo</span>
            </div>
        </div>
        
        <!-- Indicador de scroll -->
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <span>Explorar</span>
        </div>
    </div>
    
    <script src="banner-02.js"></script>
</body>
</html>

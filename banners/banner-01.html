<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAN-01: Hero Parallax Multicapa</title>
    <link rel="stylesheet" href="banner-01.css">
</head>
<body>
    <div class="hero-parallax-container" id="heroContainer">
        <!-- Capa 1: Fondo más lento -->
        <div class="parallax-layer layer-back" data-speed="0.2">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
        </div>
        
        <!-- Capa 2: Contenido medio -->
        <div class="parallax-layer layer-mid" data-speed="0.5">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>
        </div>
        
        <!-- Capa 3: Contenido frontal (más rápido) -->
        <div class="parallax-layer layer-front" data-speed="0.8">
            <div class="hero-content">
                <h1 class="hero-title">Diseño que<br><span class="gradient-text">se mueve</span></h1>
                <p class="hero-subtitle">Experiencias visuales inmersivas con profundidad 3D</p>
                <button class="hero-cta">Descubrir más</button>
            </div>
        </div>
        
        <!-- Capa 4: Elementos decorativos ultra frontales -->
        <div class="parallax-layer layer-ultra" data-speed="1.2">
            <div class="deco-line line-1"></div>
            <div class="deco-line line-2"></div>
            <div class="deco-dot"></div>
        </div>
    </div>
    
    <script src="banner-01.js"></script>
</body>
</html>

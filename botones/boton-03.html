<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT-03: Menú Radial 3D</title>
    <link rel="stylesheet" href="boton-03.css">
</head>
<body>
    <div class="radial-demo">
        <h1>Menú Radial 3D</h1>
        <p class="subtitle">Haz clic en el botón para expandir opciones</p>
        
        <div class="radial-menu-container" id="radialMenu">
            <!-- Opciones del menú (aparecen al expandir) -->
            <button class="radial-option" data-index="0" style="--i:0">
                <span class="opt-icon">🏠</span>
                <span class="opt-label">Inicio</span>
            </button>
            <button class="radial-option" data-index="1" style="--i:1">
                <span class="opt-icon">👤</span>
                <span class="opt-label">Perfil</span>
            </button>
            <button class="radial-option" data-index="2" style="--i:2">
                <span class="opt-icon">⚙️</span>
                <span class="opt-label">Ajustes</span>
            </button>
            <button class="radial-option" data-index="3" style="--i:3">
                <span class="opt-icon">💾</span>
                <span class="opt-label">Guardar</span>
            </button>
            <button class="radial-option" data-index="4" style="--i:4">
                <span class="opt-icon">📤</span>
                <span class="opt-label">Compartir</span>
            </button>
            
            <!-- Botón principal -->
            <button class="radial-menu-btn" id="mainBtn">
                <span class="btn-icon-open">+</span>
                <span class="btn-icon-close">✕</span>
            </button>
        </div>
        
        <div class="demo-info">
            <h3>Características:</h3>
            <ul>
                <li>✦ Apertura radial con animación 3D</li>
                <li>✦ Cada opción en ángulo calculado automáticamente</li>
                <li>✦ Efectos de escala y opacidad escalonados</li>
                <li>✦ Cierre al hacer clic fuera o en opción</li>
            </ul>
        </div>
    </div>
    
    <script src="boton-03.js"></script>
</body>
</html>

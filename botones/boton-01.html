<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT-01: Ripple + Liquid Fill</title>
    <link rel="stylesheet" href="boton-01.css">
</head>
<body>
    <div class="demo-wrapper">
        <h1>Botón Ripple + Liquid Fill</h1>
        <p class="subtitle">Haz clic y pasa el ratón para ver los efectos</p>
        
        <div class="buttons-showcase">
            <button class="liquid-ripple-btn" data-color="#6366f1">
                <span class="btn-text">Explorar Proyectos</span>
                <span class="btn-liquid"></span>
                <span class="btn-ripple"></span>
            </button>
            
            <button class="liquid-ripple-btn variant-2" data-color="#ec4899">
                <span class="btn-text">Comenzar Ahora</span>
                <span class="btn-liquid"></span>
                <span class="btn-ripple"></span>
            </button>
            
            <button class="liquid-ripple-btn variant-3" data-color="#10b981">
                <span class="btn-text">Descargar Gratis</span>
                <span class="btn-liquid"></span>
                <span class="btn-ripple"></span>
            </button>
        </div>
        
        <div class="instructions">
            <h3>Características:</h3>
            <ul>
                <li>✦ Efecto onda expansiva (ripple) al hacer clic</li>
                <li>✦ Relleno líquido que sube al hacer hover</li>
                <li>✦ Transiciones suaves y naturales</li>
                <li>✦ Compatible con cualquier color</li>
            </ul>
        </div>
    </div>
    
    <script src="boton-01.js"></script>
</body>
</html>

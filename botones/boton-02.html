<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT-02: Neón Flicker Glow</title>
    <link rel="stylesheet" href="boton-02.css">
</head>
<body>
    <div class="neon-demo">
        <div class="ambient-light"></div>
        
        <h1 class="neon-title">NEON FLICKER</h1>
        
        <div class="buttons-row">
            <button class="neon-flicker-btn pink">
                <span class="neon-text">RESERVAR</span>
                <span class="neon-glow"></span>
                <span class="neon-glow-delayed"></span>
            </button>
            
            <button class="neon-flicker-btn cyan">
                <span class="neon-text">COMPRAR</span>
                <span class="neon-glow"></span>
                <span class="neon-glow-delayed"></span>
            </button>
            
            <button class="neon-flicker-btn green">
                <span class="neon-text">INSTALAR</span>
                <span class="neon-glow"></span>
                <span class="neon-glow-delayed"></span>
            </button>
        </div>
        
        <p class="demo-note">Efecto de parpadeo aleatorio realista + destello al hover</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

    <title>BOT-05: Corte Diagonal</title>
    <link rel="stylesheet" href="boton-05.css">
</head>
<body>
    <div class="diagonal-demo">
        <h1>Corte Diagonal</h1>
        
        <div class="buttons-showcase">
            <button class="diagonal-btn">
                <span class="btn-text">Hover me</span>

            </button>
        </div>
    </div>
    
    <script src="boton-05.js"></script>
